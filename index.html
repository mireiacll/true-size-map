<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>True Size Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="map"></div>

    <!-- popup -->
    <div id="popup" class="ol-popup">
      <a href="#" id="popup-closer" class="ol-popup-closer"></a>
      <div id="popup-content"></div>
    </div>

    <!-- top bar -->
    <div id="topbar">
      <div id="mode-toggle">
        <button id="btn-all" class="mode-btn active">All Countries</button>
        <button id="btn-search" class="mode-btn">Search</button>
      </div>

      <!-- search UI — only visible in search mode -->
      <div id="search-box" class="hidden">
        <div id="search-wrap">
          <svg id="search-icon" viewBox="0 0 20 20" fill="none">
            <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input id="search-input" type="text" placeholder="Search country…" autocomplete="off" />
          <button id="search-clear" class="hidden">✕</button>
        </div>
        <ul id="search-dropdown" class="hidden"></ul>
      </div>

      <button id="reset-btn">Reset</button>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
